<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Relay Stats — Check Your Bridge Activity</title>
  <meta name="description" content="Check your Relay bridge stats instantly. No wallet connect. No signup. Free forever."/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* All your original CSS styles remain the same */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c10;
      --surface: #0e1419;
      --surface2: #141c24;
      --border: #1e2d3d;
      --teal: #00d4aa;
      --teal-dim: rgba(0,212,170,0.1);
      --teal-glow: rgba(0,212,170,0.2);
      --text: #e8f0f7;
      --muted: #5a7a8a;
      --red: #f87171;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,170,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,170,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }
    .glow {
      position: fixed;
      width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,212,170,0.05) 0%, transparent 70%);
      top: -250px; left: 50%; transform: translateX(-50%);
      pointer-events: none; z-index: 0;
    }
    .wrap {
      position: relative; z-index: 1;
      max-width: 800px; margin: 0 auto; padding: 0 20px;
    }
    header { padding: 44px 0 0; text-align: center; }
    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--teal-dim);
      border: 1px solid rgba(0,212,170,0.18);
      border-radius: 20px; padding: 5px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--teal);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 26px;
    }
    .dot { width: 6px; height: 6px; background: var(--teal); border-radius: 50%; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    h1 {
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 800; line-height: 1.05;
      letter-spacing: -0.02em; margin-bottom: 14px;
    }
    h1 span { color: var(--teal); }
    .sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; color: var(--muted);
      line-height: 1.8; max-width: 460px;
      margin: 0 auto 44px;
    }
    .search-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 6px 6px 6px 18px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-box:focus-within {
      border-color: rgba(0,212,170,0.35);
      box-shadow: 0 0 0 3px var(--teal-dim);
    }
    .search-icon { color: var(--muted); font-size: 15px; flex-shrink: 0; }
    #walletInput {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; color: var(--text); min-width: 0;
    }
    #walletInput::placeholder { color: var(--muted); }
    #searchBtn {
      background: var(--teal); color: #000;
      border: none; border-radius: 10px;
      padding: 12px 22px;
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 13px;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: background .2s, transform .1s;
    }
    #searchBtn:hover { background: #00f0c0; }
    #searchBtn:active { transform: scale(0.97); }
    #searchBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
      text-align: center; margin-bottom: 50px;
    }
    #progressWrap {
      display: none; text-align: center; padding: 50px 0;
    }
    .progress-bar-bg {
      background: var(--surface2);
      border-radius: 99px; height: 4px;
      max-width: 300px; margin: 0 auto 16px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--teal);
      border-radius: 99px; width: 0%;
      transition: width .4s ease;
    }
    .progress-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--muted);
    }
    #errorBox {
      display: none;
      background: rgba(248,113,113,0.07);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 12px; padding: 14px 18px;
      margin-bottom: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; color: var(--red);
    }
    #results { display: none; animation: fadeUp .5s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .wallet-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--muted);
      text-align: center; margin-bottom: 26px;
    }
    .wallet-tag span { color: var(--teal); }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px; margin-bottom: 12px;
    }
    @media(max-width:480px){ .stats-grid{ grid-template-columns:1fr; } }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 22px 22px;
      position: relative; overflow: hidden;
      transition: border-color .2s, transform .2s;
    }
    .card:hover { border-color: rgba(0,212,170,0.18); transform: translateY(-2px); }
    .card.hero {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, var(--surface) 0%, rgba(0,212,170,0.04) 100%);
      border-color: rgba(0,212,170,0.14);
    }
    .card-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; text-transform: uppercase;
      letter-spacing: .12em; color: var(--muted); margin-bottom: 10px;
    }
    .card-value {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800; letter-spacing: -0.02em; line-height: 1;
    }
    .card.hero .card-value { color: var(--teal); font-size: clamp(2.2rem, 5vw, 3rem); }
    .chains-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 22px; margin-bottom: 12px;
    }
    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; text-transform: uppercase;
      letter-spacing: .12em; color: var(--muted); margin-bottom: 14px;
    }
    .chains-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .chain-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 5px 11px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text);
      display: flex; align-items: center; gap: 6px;
    }
    .pill-count {
      background: var(--teal-dim); color: var(--teal);
      border-radius: 4px; padding: 1px 6px; font-size: 10px;
    }
    .share-section {
      background: var(--surface);
      border: 1px solid rgba(0,212,170,0.14);
      border-radius: 14px; padding: 22px;
      margin-bottom: 12px; text-align: center;
    }
    .share-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn-outline {
      background: none; border: 1px solid var(--teal);
      color: var(--teal); border-radius: 10px;
      padding: 10px 20px;
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 13px;
      cursor: pointer; transition: background .2s, color .2s;
    }
    .btn-outline:hover { background: var(--teal); color: #000; }
    .btn-solid {
      background: var(--teal); color: #000;
      border: none; border-radius: 10px;
      padding: 10px 20px;
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 13px;
      cursor: pointer; transition: background .2s;
    }
    .btn-solid:hover { background: #00f0c0; }

    /* Hidden share card styles */
    #shareCard {
      position: fixed; left: -9999px; top: 0;
      width: 600px; padding: 40px;
      background: #080c10;
      font-family: 'Syne', sans-serif;
    }
    .sc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
    .sc-title { font-size: 22px; font-weight: 800; color: #e8f0f7; }
    .sc-title span { color: #00d4aa; }
    .sc-wallet { font-size: 11px; color: #00d4aa; font-family: 'JetBrains Mono', monospace; }
    .sc-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 24px; }
    .sc-stat { background: #0e1419; border: 1px solid #1e2d3d; border-radius: 10px; padding: 16px; }
    .sc-stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: #5a7a8a; font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }
    .sc-stat-value { font-size: 22px; font-weight: 800; color: #e8f0f7; }
    .sc-stat-value.big { color: #00d4aa; font-size: 28px; }
    .tx-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; margin-bottom: 12px;
    }
    .tx-head {
      padding: 16px 22px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .tx-badge {
      background: var(--teal-dim); color: var(--teal);
      border-radius: 6px; padding: 3px 10px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
    }
    .tx-row {
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
    }
    .tx-chains {
      display: flex; flex-direction: column;
      align-items: center; gap: 2px; flex-shrink: 0;
    }
    .tx-chain-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--muted);
    }
    .tx-arrow-icon { color: var(--teal); font-size: 11px; }
    .tx-meta { flex: 1; min-width: 0; }
    .tx-amt {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 500;
    }
    .tx-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }
    .tx-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; padding: 3px 9px; border-radius: 6px;
    }
    .s-ok  { background: rgba(0,212,170,0.1); color: var(--teal); }
    .s-pend{ background: rgba(251,191,36,0.1); color: #fbbf24; }
    .s-fail{ background: rgba(248,113,113,0.1); color: var(--red); }
    .show-more-btn {
      display: block; width: 100%;
      background: none; border: none;
      padding: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--muted);
      cursor: pointer; text-align: center;
      border-top: 1px solid var(--border);
    }
    footer { text-align: center; padding: 28px 0 52px; border-top: 1px solid var(--border); margin-top: 40px; }
    .footer-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); line-height: 2.2; }
    .footer-text a { color: var(--teal); text-decoration: none; }
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--surface); border: 1px solid var(--teal);
      color: var(--teal); border-radius: 10px;
      padding: 12px 24px;
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      z-index: 999; transition: transform .3s ease, opacity .3s ease;
      opacity: 0;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>
<div class="glow"></div>
<div id="toast"></div>

<div id="shareCard">
  <div class="sc-header">
    <div>
      <div class="sc-title">Relay <span>Bridge Stats</span></div>
    </div>
    <div class="sc-wallet" id="sc-wallet"></div>
  </div>
  <div class="sc-stats">
    <div class="sc-stat" style="grid-column:1/4">
      <div class="sc-stat-label">Total Volume</div>
      <div class="sc-stat-value big" id="sc-vol">—</div>
    </div>
    <div class="sc-stat">
      <div class="sc-stat-label">Transactions</div>
      <div class="sc-stat-value" id="sc-txs">—</div>
    </div>
    <div class="sc-stat">
      <div class="sc-stat-label">Chains</div>
      <div class="sc-stat-value" id="sc-chains">—</div>
    </div>
    <div class="sc-stat">
      <div class="sc-stat-label">Success Rate</div>
      <div class="sc-stat-value" id="sc-rate">—</div>
    </div>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="badge"><div class="dot"></div>Relay Protocol · Live Data</div>
    <h1>Your Relay<br/><span>Bridge Stats</span></h1>
    <p class="sub">Check your cross-chain volume for free.</p>
  </header>

  <div class="search-box">
    <span class="search-icon">⬡</span>
    <input type="text" id="walletInput" placeholder="Paste your wallet address 0x..." autocomplete="off"/>
    <button id="searchBtn" onclick="startFetch()">Check Stats →</button>
  </div>
  <p class="hint">Works with any EVM wallet · Powered by Relay API</p>

  <div id="errorBox"></div>

  <div id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <p class="progress-label" id="progressLabel">Connecting...</p>
  </div>

  <div id="results"></div>

  <footer>
    <p class="footer-text">
      Built by <a href="https://twitter.com/alpinoWolf" target="_blank">@alpinoWolf</a> · Data from relay.link
    </p>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const CHAINS = { 1:'Ethereum', 10:'Optimism', 8453:'Base', 42161:'Arbitrum', 137:'Polygon', 56:'BNB Chain', 43114:'Avalanche', 7777777:'Zora', 534352:'Scroll', 59144:'Linea', 81457:'Blast', 324:'zkSync', 792703809:'Solana' };
const chainName = id => CHAINS[id] || `Chain ${id}`;

function fmtUSD(v) {
  const n = parseFloat(v||0);
  if(n>=1000000) return '$'+(n/1000000).toFixed(2)+'M';
  if(n>=1000) return '$'+(n/1000).toFixed(1)+'K';
  return '$'+n.toFixed(2);
}

function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(()=>toast('✓ Copied!'));
}

function countUp(el, target, prefix='', suffix='', dur=1200) {
  const start = performance.now();
  const run = now => {
    const p = Math.min((now-start)/dur, 1);
    const e = 1-Math.pow(1-p,3);
    const cur = e*target;
    el.textContent = prefix+cur.toFixed(2)+suffix;
    if(p<1) requestAnimationFrame(run);
  };
  requestAnimationFrame(run);
}

let allTxs = [];
let visibleCount = 20;

async function smartFetch(url) {
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`
  ];
  for (const u of proxies) {
    try {
      const r = await fetch(u);
      if (r.ok) {
        const json = await r.json();
        return json.contents ? JSON.parse(json.contents) : json;
      }
    } catch(e) { continue; }
  }
  throw new Error('API Timeout. Please refresh and try again.');
}

async function startFetch() {
  const wallet = document.getElementById('walletInput').value.trim();
  if(!wallet) return;
  
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';
  
  allTxs = [];
  try {
    const data = await smartFetch(`https://api.relay.link/requests?user=${wallet}&limit=100`);
    allTxs = data.requests || [];

    if(allTxs.length === 0) {
        throw new Error("No transactions found.");
    }

    renderResults(wallet);
  } catch(err) {
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('errorBox').textContent = '⚠ ' + err.message;
  } finally {
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('progressWrap').style.display = 'none';
  }
}

function renderResults(wallet) {
  const txs = allTxs;
  let totalUSD = 0;
  const chains = new Set();
  
  txs.forEach(tx => {
    totalUSD += parseFloat(tx.inAmountUsd || tx.data?.inAmountUsd || 0);
    if(tx.originChainId) chains.add(tx.originChainId);
  });

  const shortW = wallet.slice(0,6)+'...'+wallet.slice(-4);
  document.getElementById('sc-wallet').textContent = shortW;
  document.getElementById('sc-vol').textContent = fmtUSD(totalUSD);
  document.getElementById('sc-txs').textContent = txs.length;
  document.getElementById('sc-chains').textContent = chains.size;
  document.getElementById('sc-rate').textContent = '100%';

  document.getElementById('results').innerHTML = `
    <div class="stats-grid">
        <div class="card hero"><div class="card-label">Volume</div><div class="card-value" id="r-vol">$0.00</div></div>
        <div class="card"><div class="card-label">TXs</div><div class="card-value" id="r-txs">0</div></div>
        <div class="card"><div class="card-label">Chains</div><div class="card-value" id="r-chains">0</div></div>
    </div>
    <div class="share-section">
        <button class="btn-solid" onclick="downloadCard()">Download Image</button>
    </div>
    <div class="tx-wrap"><div id="txList"></div></div>
  `;
  document.getElementById('results').style.display = 'block';

  countUp(document.getElementById('r-vol'), totalUSD, '$');
  document.getElementById('r-txs').textContent = txs.length;
  document.getElementById('r-chains').textContent = chains.size;

  renderTxRows();
}

function renderTxRows() {
  const list = document.getElementById('txList');
  list.innerHTML = allTxs.slice(0, visibleCount).map(tx => `
    <div class="tx-row">
        <div class="tx-meta">
            <div class="tx-amt">${fmtUSD(tx.inAmountUsd || tx.data?.inAmountUsd)}</div>
            <div class="tx-date">${fmtDate(tx.createdAt || tx.data?.createdAt)}</div>
        </div>
        <span class="tx-status s-ok">success</span>
    </div>
  `).join('');
}

async function downloadCard() {
  toast('⏳ Generating...');
  const canvas = await html2canvas(document.getElementById('shareCard'), { backgroundColor: '#080c10', scale: 2, useCORS: true });
  const link = document.createElement('a');
  link.download = 'relay-stats.png';
  link.href = canvas.toDataURL();
  link.click();
  toast('✓ Done!');
}
</script>
</body>
</html>
